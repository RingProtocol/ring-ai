description: 'dapp-to-ringwallet Skill Evaluation'
prompts:
  - file://prompt-wrapper.txt
providers:
  - id: anthropic:claude-sonnet-4-5-20250929
    config:
      temperature: 0
defaultTest:
  options:
    timeout: 120000
  vars:
    skill_content: file://../../../packages/plugins/ring-wallet/skills/dapp-to-ringwallet/SKILL.md
tests:
  - vars:
      case_content: file://cases/basic.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains
        value: 'dappsdk.js'
      - type: contains
        value: 'window.ethereum'
      - type: contains
        value: 'EIP-1193'
      - type: contains
        value: 'EIP-6963'
  - vars:
      case_content: file://cases/csp-and-iframe.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains
        value: 'Content-Security-Policy'
      - type: contains
        value: 'X-Frame-Options'
      - type: contains-any
        value:
          - 'DENY'
          - 'SAMEORIGIN'
  - vars:
      case_content: file://cases/nextjs.md
    assert:
      - type: llm-rubric
        value: file://rubrics/correctness.txt
        threshold: 0.8
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: llm-rubric
        value: file://rubrics/completeness.txt
        threshold: 0.85
        provider: anthropic:claude-sonnet-4-5-20250929
      - type: contains-any
        value:
          - 'app/layout.tsx'
          - 'pages/_document.tsx'
      - type: contains
        value: 'testdapp'
